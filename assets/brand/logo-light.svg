<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Madison County Roofing · Est. 1937">
  <!-- Outer double-line ring in paper -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#F7F4ED" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#F7F4ED" stroke-width="0.75"/>

  <defs>
    <path id="mcr-l-top" d="M 22,100 A 78,78 0 0 1 178,100"/>
    <path id="mcr-l-bot" d="M 178,100 A 78,78 0 0 1 22,100"/>
  </defs>

  <text font-family="Fraunces, Georgia, serif" font-weight="700" font-size="11" letter-spacing="2.5" fill="#F7F4ED">
    <textPath href="#mcr-l-top" startOffset="50%" text-anchor="middle">MADISON COUNTY ROOFING</textPath>
  </text>
  <text font-family="Fraunces, Georgia, serif" font-weight="500" font-style="italic" font-size="9" letter-spacing="2.5" fill="#F7F4ED">
    <textPath href="#mcr-l-bot" startOffset="50%" text-anchor="middle">COLLINSVILLE · ILLINOIS</textPath>
  </text>

  <g fill="#F7F4ED">
    <path d="M 14,100 L 18,96 L 22,100 L 18,104 Z"/>
    <path d="M 178,100 L 182,96 L 186,100 L 182,104 Z"/>
  </g>

  <!-- Central house silhouette in brick-bright (more visible on dark) -->
  <g fill="#C57E50">
    <path d="M 60,108 L 100,72 L 140,108 L 138,108 L 100,76 L 62,108 Z"/>
    <path d="M 65,115 L 100,84 L 135,115 L 135,118 L 100,89 L 65,118 Z" opacity="0.4"/>
  </g>

  <text x="100" y="135" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="700" font-style="italic"
        font-size="22" letter-spacing="-0.5"
        fill="#C57E50">EST. 1937</text>
</svg>
