<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Madison County Roofing · Est. 1937">
  <!-- Outer double-line ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="currentColor" stroke-width="0.75"/>

  <!-- Hidden arcs for circular text -->
  <defs>
    <path id="mcr-arc-top" d="M 22,100 A 78,78 0 0 1 178,100"/>
    <path id="mcr-arc-bottom" d="M 178,100 A 78,78 0 0 1 22,100"/>
  </defs>

  <!-- Top arc: MADISON COUNTY ROOFING -->
  <text font-family="Fraunces, Georgia, serif" font-weight="700" font-size="11" letter-spacing="2.5" fill="currentColor">
    <textPath href="#mcr-arc-top" startOffset="50%" text-anchor="middle">MADISON COUNTY ROOFING</textPath>
  </text>

  <!-- Bottom arc: COLLINSVILLE · ILLINOIS -->
  <text font-family="Fraunces, Georgia, serif" font-weight="500" font-style="italic" font-size="9" letter-spacing="2.5" fill="currentColor">
    <textPath href="#mcr-arc-bottom" startOffset="50%" text-anchor="middle">COLLINSVILLE · ILLINOIS</textPath>
  </text>

  <!-- Side ornaments (small filled diamonds at 3 and 9 o'clock) -->
  <g fill="currentColor">
    <path d="M 14,100 L 18,96 L 22,100 L 18,104 Z"/>
    <path d="M 178,100 L 182,96 L 186,100 L 182,104 Z"/>
  </g>

  <!-- Central monogram area -->
  <!-- House silhouette suggestion with subtle roofline -->
  <g fill="#B85428">
    <!-- Stylized house roof silhouette -->
    <path d="M 60,108 L 100,72 L 140,108 L 138,108 L 100,76 L 62,108 Z"/>
    <!-- Inner ridge -->
    <path d="M 65,115 L 100,84 L 135,115 L 135,118 L 100,89 L 65,118 Z" opacity="0.4"/>
  </g>

  <!-- EST. 1937 prominent in center -->
  <text x="100" y="135" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="700" font-style="italic"
        font-size="22" letter-spacing="-0.5"
        fill="#B85428">EST. 1937</text>
</svg>
