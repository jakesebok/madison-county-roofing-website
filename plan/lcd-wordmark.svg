<!-- LocalCraft Digital · primary wordmark (full lockup)
     Use for: footer, hero sections, marketing, business cards, brand kit.
     Renders OCALCRAFT + navy divider + DIGITAL stacked, with the
     QUALITY · VALUE · HEART values trio tucked into the crook. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 0 920 180" width="920" height="180">
  <defs>
    <style>
      @font-face { font-family: "Archivo Black"; font-style: normal; font-weight: 400 900; src: url(data:font/woff2;base64,) format("woff2"); }
      .display { font-family: 'Archivo Black', 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
      .mono    { font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace; font-weight: 500; }
    </style>
  </defs>

  <!-- L mark (carpenter's-square silhouette with coral inset) -->
  <g transform="translate(10, 5) scale(5)">
    <path d="M0 0 L8 0 L8 16 L24 16 L24 24 L0 24 Z" fill="#FAFAF8"/>
    <rect x="14" y="2" width="8" height="8" fill="#FF6B1A"/>
  </g>

  <!-- OCALCRAFT (the L mark reads as the L) -->
  <text x="135" y="100" class="display" font-size="110" letter-spacing="-3" fill="#FAFAF8">OCAL<tspan fill="#FF6B1A">CRAFT</tspan></text>

  <!-- Navy divider rule above DIGITAL -->
  <rect x="640" y="118" width="280" height="3" fill="#FAFAF8"/>

  <!-- DIGITAL right-anchored under OCALCRAFT -->
  <text x="896" y="160" text-anchor="end" class="mono" font-size="40" letter-spacing="6" fill="#C9CCD4">DIGITAL</text>

  <!-- QUALITY · VALUE · HEART tucked into the crook -->
  <text x="380" y="146" text-anchor="middle" class="mono" font-size="24" letter-spacing="4" fill="#C9CCD4">QUALITY · VALUE · HEART</text>
</svg>
